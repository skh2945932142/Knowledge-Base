services:
  vuedemo:
    build:
      context: .
      dockerfile: Dockerfile
    image: vuedemo:latest
    container_name: vuedemo
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: vuedemo-api:latest
    container_name: vuedemo-api
    environment:
      - PORT=3000
      - MONGO_URL=mongodb://mongo:27017/vuedemo
      - JWT_SECRET=my_secret_key_123
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:8
    container_name: vuedemo-mongo
    volumes:
      - vuedemo_mongo_data:/data/db
    restart: unless-stopped

volumes:
  vuedemo_mongo_data:
